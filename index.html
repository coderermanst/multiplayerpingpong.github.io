<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>PeerJS Pong</title>
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: #111;
      color: #eee;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    #ui {
      margin: 10px;
      text-align: center;
    }
    #status {
      margin-top: 5px;
      font-size: 0.9rem;
      color: #ccc;
    }
    canvas {
      background: #000;
      border: 2px solid #555;
    }
    input, button {
      padding: 4px 8px;
      margin: 2px;
    }
  </style>
</head>
<body>
  <div id="ui">
    <div>
      <button id="createHost">Create Host</button>
      <span>Your ID: <span id="myId">-</span></span>
    </div>
    <div>
      <input id="remoteId" placeholder="Remote peer ID" />
      <button id="connectBtn">Connect</button>
    </div>
    <div id="status">Not connected</div>
  </div>

  <canvas id="game" width="640" height="360"></canvas>

  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
  <script>
    const statusEl = document.getElementById('status');
    const myIdEl = document.getElementById('myId');
    const remoteIdInput = document.getElementById('remoteId');
    const createHostBtn = document.getElementById('createHost');
    const connectBtn = document.getElementById('connectBtn');

    let peer = null;
    let conn = null;
    let isHost = false;
    let connected = false;
    let gameRunning = false;

    function setStatus(msg) {
      statusEl.textContent = msg;
    }

    function initPeer() {
      if (peer) return;
      peer = new Peer();

      peer.on('open', id => {
        myIdEl.textContent = id;
        setStatus('Peer ready. Your ID: ' + id);
      });

      peer.on('connection', c => {
        if (conn) {
          c.close();
          return;
        }
        conn = c;
        isHost = true;
        setupConnectionHandlers();
        setStatus('Client connected. You are HOST.');
      });

      peer.on('error', err => {
        setStatus('Peer error: ' + err.type);
      });
    }

    createHostBtn.addEventListener('click', () => {
      initPeer();
      isHost = true;
      setStatus('Host mode: waiting for client…');
    });

    connectBtn.addEventListener('click', () => {
      const remoteId = remoteIdInput.value.trim();
      if (!remoteId) {
        setStatus('Enter a remote ID first.');
        return;
      }
      initPeer();
      isHost = false;
      setStatus('Connecting to ' + remoteId + '…');
      conn = peer.connect(remoteId);
      setupConnectionHandlers();
    });

    function setupConnectionHandlers() {
      if (!conn) return;

      conn.on('open', () => {
        connected = true;

        if (isHost) {
          gameRunning = true;
          conn.send({ type: "startGame" });
        }

        setStatus(isHost ? 'Client connected. You are HOST.' : 'Connected to host. You are CLIENT.');
      });

      conn.on('data', data => {
        if (!isHost && data.type === "startGame") {
          gameRunning = true;
          setStatus("Game started!");
        }

        if (isHost) {
          if (typeof data.clientPaddleY === 'number') {
            clientPaddle.y = data.clientPaddleY;
          }
        } else {
          if (data.type === 'state') applyGameState(data);
          if (data.type === 'gameOver') {
            gameRunning = false;
            setStatus(data.winner === 'host' ? 'Host wins!' : 'You win!');
          }
        }
      });

      conn.on('close', () => {
        connected = false;
        setStatus('Connection closed.');
      });

      conn.on('error', err => {
        setStatus('Connection error: ' + err.type);
      });
    }

    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');

    const W = canvas.width;
    const H = canvas.height;

    const paddleWidth = 10;
    const paddleHeight = 70;
    const paddleSpeed = 6;
    const ballSize = 10;

    const hostPaddle = { x: 20, y: H / 2 - paddleHeight / 2 };
    const clientPaddle = { x: W - 20 - paddleWidth, y: H / 2 - paddleHeight / 2 };

    const ball = { x: W / 2, y: H / 2, vx: 4, vy: 3 };

    let hostScore = 0;
    let clientScore = 0;

    const keys = { ArrowUp: false, ArrowDown: false, w: false, s: false };

    window.addEventListener('keydown', e => { if (e.key in keys) keys[e.key] = true; });
    window.addEventListener('keyup', e => { if (e.key in keys) keys[e.key] = false; });

    function resetBall(direction = 1) {
      ball.x = W / 2;
      ball.y = H / 2;
      ball.vx = 4 * direction;
      ball.vy = (Math.random() * 4 - 2) || 2;
    }

    function checkWin() {
      if (hostScore >= 5 || clientScore >= 5) {
        gameRunning = false;
        const winner = hostScore >= 5 ? 'host' : 'client';
        if (connected && conn && conn.open) {
          conn.send({ type: 'gameOver', winner });
        }
        setStatus(winner === 'host' ? 'You win!' : 'Client wins!');
      }
    }

    function updateHost() {
      if (!gameRunning) return;

      if (keys.w || keys.ArrowUp) hostPaddle.y -= paddleSpeed;
      if (keys.s || keys.ArrowDown) hostPaddle.y += paddleSpeed;
      hostPaddle.y = Math.max(0, Math.min(H - paddleHeight, hostPaddle.y));

      ball.x += ball.vx;
      ball.y += ball.vy;

      if (ball.y <= 0 || ball.y + ballSize >= H) ball.vy *= -1;

      if (
        ball.x <= hostPaddle.x + paddleWidth &&
        ball.x >= hostPaddle.x &&
        ball.y + ballSize >= hostPaddle.y &&
        ball.y <= hostPaddle.y + paddleHeight
      ) ball.vx = Math.abs(ball.vx);

      if (
        ball.x + ballSize >= clientPaddle.x &&
        ball.x + ballSize <= clientPaddle.x + paddleWidth &&
        ball.y + ballSize >= clientPaddle.y &&
        ball.y <= clientPaddle.y + paddleHeight
      ) ball.vx = -Math.abs(ball.vx);

      if (ball.x < 0) {
        clientScore++;
        checkWin();
        resetBall(1);
      } else if (ball.x > W) {
        hostScore++;
        checkWin();
        resetBall(-1);
      }

      if (connected && conn && conn.open) {
        conn.send({
          type: 'state',
          hostPaddleY: hostPaddle.y,
          clientPaddleY: clientPaddle.y,
          ballX: ball.x,
          ballY: ball.y,
          hostScore,
          clientScore
        });
      }
    }

    function applyGameState(state) {
      hostPaddle.y = state.hostPaddleY;
      clientPaddle.y = state.clientPaddleY;
      ball.x = state.ballX;
      ball.y = state.ballY;
      hostScore = state.hostScore;
      clientScore = state.clientScore;
    }

    function updateClient() {
      if (!gameRunning) return;

      if (keys.w || keys.ArrowUp) clientPaddle.y -= paddleSpeed;
      if (keys.s || keys.ArrowDown) clientPaddle.y += paddleSpeed;
      clientPaddle.y = Math.max(0, Math.min(H - paddleHeight, clientPaddle.y));

      if (connected && conn && conn.open) {
        conn.send({ clientPaddleY: clientPaddle.y });
      }
    }

    function draw() {
      ctx.clearRect(0, 0, W, H);

      ctx.strokeStyle = '#444';
      ctx.setLineDash([5, 5]);
      ctx.beginPath();
      ctx.moveTo(W / 2, 0);
      ctx.lineTo(W / 2, H);
      ctx.stroke();
      ctx.setLineDash([]);

      ctx.fillStyle = '#fff';
      ctx.fillRect(hostPaddle.x, hostPaddle.y, paddleWidth, paddleHeight);
      ctx.fillRect(clientPaddle.x, clientPaddle.y, paddleWidth, paddleHeight);

      ctx.fillRect(ball.x, ball.y, ballSize, ballSize);

      ctx.font = '20px monospace';
      ctx.textAlign = 'center';
      ctx.fillText(hostScore, W / 4, 30);
      ctx.fillText(clientScore, (3 * W) / 4, 30);

      ctx.font = '14px monospace';
      ctx.textAlign = 'left';
      ctx.fillText(isHost ? 'ROLE: HOST' : 'ROLE: CLIENT', 10, H - 10);
    }

    function loop() {
      if (gameRunning) {
        if (isHost) updateHost();
        else updateClient();
      }
      draw();
      requestAnimationFrame(loop);
    }

    requestAnimationFrame(loop);
  </script>
</body>
</html>
